<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastrar Produto - Trufas da Juju</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="painel-admin">
    <div th:replace="~{fragments/header :: cabecalho}"></div>

    <main class="painel-main painel-main--estreito">
        <div class="painel-boas-vindas">
            <h1 class="painel-titulo">Cadastrar Novo Produto</h1>
            <p class="painel-subtitulo">Adicione um novo produto ao catálogo.</p>
        </div>

        <p id="mensagem-produto" class="mensagem" style="display:none;"></p>

        <div class="form-card">
            <form id="form-novo-produto" class="form-novo">
                <div class="form-grupo">
                    <label for="nome">Nome do produto</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-grupo">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="3"></textarea>
                </div>
                <div class="form-grupo">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" name="preco" min="0.01" step="0.01" required>
                </div>

                <div class="form-grupo">
                    <label>Imagem do produto</label>
                    <p class="form-dica">Escolha uma imagem da biblioteca ou envie uma nova.</p>
                    <div id="galeria-imagens" class="galeria-imagens">
                        <label class="item-galeria" th:each="imagem : ${imagens}">
                            <input type="radio" name="imagemId" th:value="${imagem.id}">
                            <img th:src="@{${imagem.caminho}}" th:alt="${imagem.nomeArquivo}">
                        </label>
                    </div>
                </div>

                <div class="form-grupo">
                    <label for="novaImagem">Enviar nova imagem para a biblioteca</label>
                    <input type="file" id="novaImagem" accept="image/*">
                    <div class="form-upload-row">
                        <button type="button" id="btn-enviar-imagem" class="btn-painel btn-painel--contorno btn-painel--sm">
                            <span th:replace="~{fragments/icones :: icone-imagem}"></span> Enviar imagem
                        </button>
                        <span id="status-upload"></span>
                    </div>
                </div>

                <button type="submit" class="btn-painel btn-painel--cheio btn-painel--full">
                    <span th:replace="~{fragments/icones :: icone-mais}"></span> Cadastrar Produto
                </button>
            </form>
        </div>
    </main>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const URL_API_PRODUTOS = /*[[@{/api/admin/produtos}]]*/ '/api/admin/produtos';
        /*]]>*/
    </script>
    <script th:src="@{/js/admin-produto.js}"></script>
</body>
</html>
