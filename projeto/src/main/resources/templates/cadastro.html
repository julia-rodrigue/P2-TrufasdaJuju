<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Criar Conta - Trufas da Juju</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="painel-admin">
    <div th:replace="~{fragments/header :: cabecalho}"></div>

    <main class="painel-main painel-main--estreito">
        <div class="painel-boas-vindas">
            <h1 class="painel-titulo">Criar Conta</h1>
            <p class="painel-subtitulo">Preencha os dados abaixo para se cadastrar.</p>
        </div>

        <p th:if="${erro}" class="mensagem mensagem-erro" th:text="${erro}">Erro</p>

        <div class="form-card">
            <form th:action="@{/cadastro}" th:object="${usuario}" method="post" class="form-novo">
                <div class="form-grupo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" th:field="*{nome}" required>
                </div>
                <div class="form-grupo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                <div class="form-grupo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" th:field="*{cpf}" placeholder="Somente números" maxlength="11" required>
                </div>
                <div class="form-grupo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" th:field="*{telefone}" placeholder="(00) 00000-0000" required>
                </div>
                <div class="form-grupo">
                    <label for="dataNascimento">Data de nascimento</label>
                    <input type="date" id="dataNascimento" th:field="*{dataNascimento}" required>
                </div>
                <div class="form-grupo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" minlength="6" required>
                </div>
                <button type="submit" class="btn-painel btn-painel--cheio btn-painel--full">
                    <span th:replace="~{fragments/icones :: icone-cadastro}"></span> Cadastrar
                </button>
            </form>
        </div>

        <p class="link-secundario">Já tem uma conta? <a th:href="@{/login}">Entrar</a></p>
    </main>
</body>
</html>
