<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="cabecalho" class="header-admin">
        <a th:href="@{/}" class="header-admin-logo" style="text-decoration:none;">
            <span class="header-admin-titulo">TRUFAS DA JUJU</span>
            <span class="header-admin-sub" th:if="${usuarioLogado != null and usuarioLogado.administrador}">PAINEL ADMINISTRATIVO</span>
            <span class="header-admin-sub" th:if="${usuarioLogado == null or !usuarioLogado.administrador}">🍫 Doces artesanais</span>
        </a>
        <nav class="header-admin-nav">
            <a th:href="@{/}" class="header-nav-link">
                <span th:replace="~{fragments/icones :: icone-home}"></span> Início
            </a>

            <!-- Cliente logado -->
            <th:block th:if="${usuarioLogado != null and !usuarioLogado.administrador}">
                <a th:href="@{/cliente/cardapio}" class="header-nav-link header-nav-link--destaque">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                    Cardápio
                </a>
                <a th:href="@{/meus-pedidos}" class="header-nav-link">
                    <span th:replace="~{fragments/icones :: icone-historico}"></span> Meus Pedidos
                </a>
            </th:block>

            <!-- Administrador logado -->
            <th:block th:if="${usuarioLogado != null and usuarioLogado.administrador}">
                <a th:href="@{/produtos}" class="header-nav-link">
                    <span th:replace="~{fragments/icones :: icone-produtos}"></span> Produtos
                </a>
                <a th:href="@{/admin/produtos/novo}" class="header-nav-link header-nav-link--destaque">
                    <span th:replace="~{fragments/icones :: icone-mais}"></span> Cadastrar Produto
                </a>
                <a th:href="@{/admin/historico}" class="header-nav-link">
                    <span th:replace="~{fragments/icones :: icone-historico}"></span> Histórico
                </a>
            </th:block>

            <!-- Não logado -->
            <th:block th:if="${usuarioLogado == null}">
                <a th:href="@{/produtos}" class="header-nav-link">
                    <span th:replace="~{fragments/icones :: icone-produtos}"></span> Produtos
                </a>
                <a th:href="@{/login}" class="header-nav-link">
                    <span th:replace="~{fragments/icones :: icone-entrar}"></span> Entrar
                </a>
                <a th:href="@{/cadastro}" class="header-nav-link header-nav-link--destaque">
                    <span th:replace="~{fragments/icones :: icone-cadastro}"></span> Criar conta
                </a>
            </th:block>

            <!-- Usuário logado (nome + logout) -->
            <th:block th:if="${usuarioLogado != null}">
                <span class="header-admin-usuario">
                    <span th:replace="~{fragments/icones :: icone-usuario}"></span>
                    <span th:text="'Olá, ' + ${usuarioLogado.nome}">Olá</span>
                </span>
                <a th:href="@{/logout}" class="header-nav-link">
                    <span th:replace="~{fragments/icones :: icone-sair}"></span> Sair
                </a>
            </th:block>
        </nav>
    </header>
</body>
</html>
