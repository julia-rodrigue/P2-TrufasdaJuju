<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fazer Pedido - Trufas da Juju</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        /* Resumo do carrinho */
        .resumo-card {
            background: var(--branco);
            border: 1.5px solid #F2D4DF;
            border-radius: var(--radius);
            padding: 1.2rem 1.4rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 8px rgba(227,110,151,0.08);
        }
        .resumo-titulo {
            font-family: var(--font-titulo);
            font-size: 1rem;
            font-weight: 700;
            color: var(--rosa-escuro);
            margin: 0 0 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .resumo-vazio {
            text-align: center;
            color: var(--texto-medio);
            font-size: 0.88rem;
            padding: 0.5rem 0 0.3rem;
        }
        .resumo-lista {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .resumo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.88rem;
            gap: 0.5rem;
        }
        .resumo-item-nome {
            color: var(--texto-escuro);
            font-weight: 600;
            flex: 1;
        }
        .resumo-item-qty {
            background-color: var(--rosa-claro);
            color: var(--rosa-escuro);
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-size: 0.78rem;
        }
        .resumo-item-valor {
            color: var(--rosa-escuro);
            font-weight: 700;
            min-width: 60px;
            text-align: right;
        }
        .resumo-divider {
            border: none;
            border-top: 1px solid #F2D4DF;
            margin: 0.7rem 0;
        }
        .resumo-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .resumo-total-label {
            font-weight: 700;
            color: var(--texto-escuro);
            font-size: 0.95rem;
        }
        .resumo-total-valor {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--rosa-escuro);
        }
        .link-voltar {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.88rem;
            color: var(--rosa-escuro);
            font-weight: 600;
            margin-bottom: 1rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        .link-voltar:hover { text-decoration: underline; }

        #aviso-sem-carrinho {
            text-align: center;
            padding: 1.5rem 0 0.5rem;
        }
        #aviso-sem-carrinho p {
            color: var(--texto-medio);
            font-size: 0.93rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="painel-admin">
    <div th:replace="~{fragments/header :: cabecalho}"></div>

    <main class="painel-main painel-main--estreito">
        <div class="painel-boas-vindas">
            <h1 class="painel-titulo">Finalizar Pedido</h1>
            <p class="painel-subtitulo">Confira os itens e preencha seus dados.</p>
        </div>

        <button class="link-voltar" onclick="history.back()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Voltar ao cardápio
        </button>

        <!-- Aviso se veio sem carrinho -->
        <div id="aviso-sem-carrinho" style="display:none;">
            <p>Seu carrinho está vazio. Adicione produtos antes de fazer o pedido.</p>
            <a href="/cliente/cardapio" class="btn-painel btn-painel--cheio btn-painel--full">Ver Cardápio</a>
        </div>

        <!-- Resumo do carrinho -->
        <div class="resumo-card" id="resumo-card">
            <p class="resumo-titulo">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Itens do pedido
            </p>
            <ul class="resumo-lista" id="resumo-lista"></ul>
            <hr class="resumo-divider">
            <div class="resumo-total-row">
                <span class="resumo-total-label">Total</span>
                <span class="resumo-total-valor" id="resumo-total">R$ 0,00</span>
            </div>
        </div>

        <!-- Formulário -->
        <div class="form-card" id="form-pedido-container">
            <form th:action="@{/pedidos}" method="post" class="form-novo" id="form-pedido">
                <input type="hidden" name="itensJson" id="itensJson">

                <div class="form-grupo">
                    <label for="nomeCliente">Nome do cliente</label>
                    <input type="text" id="nomeCliente" name="nomeCliente"
                           th:value="${usuarioLogado != null ? usuarioLogado.nome : ''}" required>
                </div>
                <div class="form-grupo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone"
                           th:value="${usuarioLogado != null ? usuarioLogado.telefone : ''}" required>
                </div>
                <div class="form-grupo">
                    <label for="formaPagamento">Forma de pagamento</label>
                    <select id="formaPagamento" name="formaPagamento">
                        <option>Pix</option>
                        <option>Cartão</option>
                        <option>Dinheiro</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label for="dataRetirada">Data de retirada</label>
                    <input type="date" id="dataRetirada" name="dataRetirada">
                </div>
                <div class="form-grupo">
                    <label for="observacoes">Observações (opcional)</label>
                    <textarea id="observacoes" name="observacoes" rows="2"
                              placeholder="Alguma preferência ou alergia?"></textarea>
                </div>
                <button type="submit" class="btn-painel btn-painel--cheio btn-painel--full" id="btn-enviar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    Confirmar Pedido
                </button>
            </form>
        </div>
    </main>

    <script>
        const carrinho = JSON.parse(sessionStorage.getItem('carrinho') || '{}');
        const ids = Object.keys(carrinho);

        if (ids.length === 0) {
            document.getElementById('aviso-sem-carrinho').style.display = 'block';
            document.getElementById('resumo-card').style.display = 'none';
            document.getElementById('form-pedido-container').style.display = 'none';
        } else {
            const lista = document.getElementById('resumo-lista');
            let total = 0;
            const itens = [];

            ids.forEach(id => {
                const item = carrinho[id];
                const subtotal = item.qty * item.preco;
                total += subtotal;
                itens.push({ produtoId: id, nome: item.nome, qty: item.qty, precoUnitario: item.preco });

                const li = document.createElement('li');
                li.className = 'resumo-item';
                li.innerHTML = `
                    <span class="resumo-item-nome">${item.nome}</span>
                    <span class="resumo-item-qty">x${item.qty}</span>
                    <span class="resumo-item-valor">R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
                `;
                lista.appendChild(li);
            });

            document.getElementById('resumo-total').textContent =
                'R$ ' + total.toFixed(2).replace('.', ',');
            document.getElementById('itensJson').value = JSON.stringify(itens);
        }

        document.getElementById('form-pedido').addEventListener('submit', function() {
            sessionStorage.removeItem('carrinho');
        });
    </script>
</body>
</html>
